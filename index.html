<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Algorithms Library</title>
    <!-- Modern Typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- PrismJS Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #1e1b4b 100%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
        }

        .algorithm-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .algorithm-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
            border-color: rgba(56, 189, 248, 0.3);
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2::before {
            content: '/>';
            font-family: 'Fira Code', monospace;
            font-size: 1.2rem;
            color: #818cf8;
        }

        pre {
            border-radius: 8px !important;
            margin: 0 !important;
            background: #0f172a !important;
            border: 1px solid #1e293b;
        }

        code {
            font-family: 'Fira Code', monospace !important;
            font-size: 0.95rem !important;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Code Library</h1>
            <p class="subtitle">A curated collection of essential programs and algorithms</p>
        </header>

        <main id="algorithms-container">
            <!-- Algorithms will be dynamically loaded here -->
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Fetch the markdown file directly
            // Note: You can change the filename here if you rename your .md file
            fetch('code.md')
                .then(response => response.text())
                .then(text => {
                    const container = document.getElementById('algorithms-container');
                    
                    // Split the markdown by H3 headers (###)
                    const chunks = text.split(/(?:^|\n)### /).filter(c => c.trim().length > 0);
                    
                    chunks.forEach(chunk => {
                        const lines = chunk.split('\n');
                        const title = lines[0].trim();
                        
                        // Extract everything after the title
                        const rest = lines.slice(1).join('\n');
                        
                        // Use regex to match the code block and its language
                        const codeMatch = rest.match(/```(\w+)?\s*\r?\n([\s\S]*?)```/);
                        if (codeMatch) {
                            const lang = codeMatch[1] || 'plaintext';
                            const code = codeMatch[2].trim();
                            
                            // Extract description (text before the code block)
                            const desc = rest.split(/```/)[0].trim();
                            
                            // Build the UI elements for the card
                            const section = document.createElement('section');
                            section.className = 'algorithm-card';
                            
                            const h2 = document.createElement('h2');
                            h2.textContent = title;
                            section.appendChild(h2);
                            
                            // Add description if it exists
                            if (desc) {
                                const p = document.createElement('p');
                                p.style.color = '#94a3b8';
                                p.style.marginBottom = '1.5rem';
                                p.textContent = desc;
                                section.appendChild(p);
                            }
                            
                            const pre = document.createElement('pre');
                            const codeEl = document.createElement('code');
                            // Map generic 'c' or 'cpp' to Prism's language classes
                            codeEl.className = 'language-' + lang;
                            codeEl.textContent = code;
                            
                            pre.appendChild(codeEl);
                            section.appendChild(pre);
                            
                            container.appendChild(section);
                        }
                    });
                    
                    // Apply syntax highlighting to the newly added elements
                    if (window.Prism) {
                        Prism.highlightAll();
                    }
                })
                .catch(err => console.error('Error loading markdown file:', err));
        });
    </script>
</body>

</html>
